version: "3.9"

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - /mnt/media/appdata/prowlarr/data:/config
    ports:
      - 9696:9696
    restart: unless-stopped
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    volumes:
      - /mnt/media/appdata/overseerr:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1001
      - TZ=Europe/Budapest
    ports:
      - 5055:5055
    restart: unless-stopped
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    volumes:
      - /mnt/media/appdata/qbittorrent:/config
      - /mnt/media/downloads:/data/downloads
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1001
      - WEBUI_PORT=8080
    ports:
      - 8089:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - /mnt/media/appdata/radarr:/config
      - /mnt/media/:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1001
    ports:
      - 7878:7878
    restart: unless-stopped
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - /mnt/media/appdata/sonarr:/config
      - /mnt/media/:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1001
    ports:
      - 8989:8989
    restart: unless-stopped
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    hostname: susanoo
    volumes:
      - /mnt/media/appdata/syncthing:/config
      - /mnt/media/movies:/data/movies
      - /mnt/media/tv:/data/tv
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1001
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: unless-stopped
  tautulli:
    image: lscr.io/linuxserver/tautulli
    container_name: tautulli
    volumes:
      - /mnt/media/appdata/tautulli:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1001
      - TZ=Europe/Budapest
    ports:
      - 8181:8181
    restart: unless-stopped

networks:
  default:
    external: true
    name: amaterasu