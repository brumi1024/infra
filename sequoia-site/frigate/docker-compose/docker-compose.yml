version: "3.9"
services:
  frigate:
    container_name: frigate
    privileged: true
    restart: unless-stopped
    image: ghcr.io/blakeblackshear/frigate:v0.13.0-beta6
    shm_size: "512mb"
    devices:
      - /dev/bus/usb:/dev/bus/usb
      - /dev/dri/renderD128
    device_cgroup_rules:
      - "c 189:* rmw"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /root/appdata/frigate/:/config/:rw
      - /mnt/media/frigate:/media/frigate:rw
      - /root/appdata/frigate/db:/db:rw
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    ports:
      - "5000:5000"
      - "1935:1935"
      - "8554:8554"
    environment:
      - FRIGATE_RTSP_PASSWORD
      - LIBVA_DRIVER_NAME_JELLYFIN
      - PLUS_API_KEY